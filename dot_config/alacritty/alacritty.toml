[font]
size = 12.0

[font.normal]
family = "FiraCodeNerdFont" # "MesloLGS Nerd Font"

[keyboard]
bindings = [
  { key = "Return", mods = "Super|Shift", action = "SpawnNewInstance" },
  # Copy/paste with [ru]ssian layout
  { key = "М", mods = "Control|Shift", action = "Paste" },
  { key = "С", mods = "Control|Shift", action = "Copy" },
  # Extended keys
  # https://www.reddit.com/r/neovim/comments/12hyi9t/make_scr_cscr_stab_ctab_work_in_neovim_kitty
  { key = "Return", mods = "Shift",         chars = "\u001B[13;2u" },
  { key = "Return", mods = "Control",       chars = "\u001B[13;5u" },
  { key = "Return", mods = "Control|Shift", chars = "\u001B[13;6u" },
  { key = "Tab", mods = "Shift",         chars = "\u001B[9;2u" },
  { key = "Tab", mods = "Control",       chars = "\u001B[9;5u" },
  { key = "Tab", mods = "Control|Shift", chars = "\u001B[9;6u" },
  { key = "h", mods = "Control|Shift", chars = "\u001B[72;5u" },
  { key = "j", mods = "Control|Shift", chars = "\u001B[74;5u" },
  { key = "k", mods = "Control|Shift", chars = "\u001B[75;5u" },
  { key = "l", mods = "Control|Shift", chars = "\u001B[76;5u" },
]
